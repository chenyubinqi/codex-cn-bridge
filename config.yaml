# Codex CN Bridge 配置文件
# 将此文件复制到 ~/.codex-cn-bridge.yaml 或当前目录使用

# 当前激活的 provider（名称对应下方 providers 中的 key）
provider: deepseek

# 监听端口（默认 8088）
port: 8088

# 日志级别：debug | info | warn | error
log_level: info

# Codex 内部会用轻量模型（如 gpt-5.4-mini）做后台分析/评估
# 可以为这类请求指定单独的 provider（推荐用快速便宜的模型）
# 不配置则所有模型走同一个 provider
# mini_provider: volc           # 使用通用 Doubao 处理 mini 模型请求
# mini_model_pattern: "mini"    # 匹配模型名中包含 "mini" 的请求（默认值）

providers:
  deepseek:
    base_url: https://api.deepseek.com/v1
    # 从环境变量 DEEPSEEK_API_KEY 或直接填写
    api_key: ${DEEPSEEK_API_KEY}
    # model_map: 将 Codex 请求的模型名映射到此 provider 的模型名
    # key 为 Codex 侧模型名，value 为上游模型名；"*" 作为默认 fallback
    model_map:
      "*": deepseek-chat
      deepseek-reasoner: deepseek-reasoner

  qwen:
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key: ${DASHSCOPE_API_KEY}
    model_map:
      "*": qwen-plus
      qwen-turbo: qwen-turbo
      qwen-max: qwen-max

  kimi:
    base_url: https://api.moonshot.cn/v1
    api_key: ${MOONSHOT_API_KEY}
    model_map:
      "*": moonshot-v1-8k
      moonshot-v1-32k: moonshot-v1-32k
      moonshot-v1-128k: moonshot-v1-128k

  zhipu:
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key: ${ZHIPU_API_KEY}
    model_map:
      "*": glm-4-flash
      glm-4: glm-4
      glm-4-plus: glm-4-plus

  # 火山引擎方舟 Code Plan（字节跳动）
  # API Key 在 https://console.volcengine.com/ark/region:ark+cn-beijing/apiKey 获取
  # ⚠️  必须使用 coding/v3 端点，使用 /api/v3 会产生额外费用
  # 模型 ark-code-latest 默认走 Auto 模式，按「效果 + 速度」双维度智能选择
  volc-code:
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key: ${VOLC_API_KEY}
    model_map:
      "*": ark-code-latest

  # 火山引擎方舟（通用 Doubao 模型）
  # model_map 的 value 填写模型名或推理接入点 ID（ep-xxxxxxxx-xxxxx）
  volc:
    base_url: https://ark.cn-beijing.volces.com/api/v3
    api_key: ${VOLC_API_KEY}
    model_map:
      "*": doubao-pro-32k
      doubao-lite-32k: doubao-lite-32k
      doubao-pro-128k: doubao-pro-128k
      # 如果使用推理接入点，直接写接入点 ID，例如：
      # "*": ep-20250101000000-xxxxx

  # 自定义 provider 示例（任何兼容 OpenAI Chat Completions API 的服务）
  # custom:
  #   base_url: http://localhost:11434/v1
  #   api_key: ollama
  #   model_map:
  #     "*": qwen2.5:7b
